name: MLOps CI/CD Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  # ============================================================
  # ETAPE 1 : Tests et Validation
  # ============================================================
  test:
    name: "Tests & Validation du modele"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installation des dependances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verification syntaxe (flake8)
        run: |
          flake8 src/ tests/ app.py --max-line-length=120 --statistics

      - name: Verification formatage (black)
        run: |
          black --check src/ tests/ app.py

      - name: Entrainement du modele
        run: |
          python -m src.train

      - name: Tests unitaires (pytest)
        run: |
          pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload des resultats de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

      - name: Upload du modele (artifact)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: model/

  # ============================================================
  # ETAPE 2 : Notification par Mail
  # ============================================================
  notify:
    name: "Notification par email"
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Notification de succes
        if: needs.test.result == 'success'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "✅ [MLOps Pipeline] Build REUSSI - ${{ github.repository }}"
          to: ${{ secrets.TEAM_EMAILS }}
          from: ${{ secrets.SMTP_USERNAME }}
          body: |
            Pipeline MLOps - Rapport de Build

            Statut : SUCCES
            Repository : ${{ github.repository }}
            Branche : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Auteur : ${{ github.actor }}
            Date : ${{ github.event.head_commit.timestamp }}

            Rapport :
            - Tests unitaires : PASS
            - Validation du modele (accuracy > 80%) : PASS
            - Analyse syntaxique (flake8) : PASS
            - Formatage (black) : PASS

            Le pipeline CI/CD s'est execute avec succes.
            Le modele est pret pour le deploiement.

            Lien du workflow : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Notification d'echec
        if: needs.test.result == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ [MLOps Pipeline] Build ECHOUE - ${{ github.repository }}"
          to: ${{ secrets.TEAM_EMAILS }}
          from: ${{ secrets.SMTP_USERNAME }}
          body: |
            Pipeline MLOps - Rapport de Build

            Statut : ECHEC
            Repository : ${{ github.repository }}
            Branche : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Auteur : ${{ github.actor }}

            Une ou plusieurs etapes du pipeline ont echoue.
            Verifiez les logs pour identifier le probleme.

            Causes possibles :
            - Echec des tests unitaires
            - Accuracy du modele < 80%
            - Erreurs de syntaxe (flake8)
            - Problemes de formatage (black)

            Lien du workflow : https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # ============================================================
  # ETAPE 3 : Deploiement vers Hugging Face (sur main uniquement)
  # ============================================================
  deploy:
    name: "Deploiement Hugging Face"
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation des dependances
        run: |
          pip install huggingface-hub transformers torch

      - name: Download du modele entraine
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: model/

      - name: Upload du modele sur Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          api = HfApi()
          api.create_repo(
              repo_id='jackbrayan17/mlops-sentiment-analysis',
              repo_type='model',
              exist_ok=True,
              token='${{ secrets.HF_TOKEN }}'
          )
          api.upload_folder(
              folder_path='model',
              repo_id='jackbrayan17/mlops-sentiment-analysis',
              repo_type='model',
              token='${{ secrets.HF_TOKEN }}'
          )
          print('Modele uploade sur HF Hub avec succes!')
          "

      - name: Deploiement sur Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -c "
          from huggingface_hub import HfApi
          api = HfApi()
          api.create_repo(
              repo_id='jackbrayan17/mlops-sentiment-analysis-demo',
              repo_type='space',
              space_sdk='gradio',
              exist_ok=True,
              token='${{ secrets.HF_TOKEN }}'
          )
          # Upload app.py et requirements pour le Space
          api.upload_file(
              path_or_fileobj='app.py',
              path_in_repo='app.py',
              repo_id='jackbrayan17/mlops-sentiment-analysis-demo',
              repo_type='space',
              token='${{ secrets.HF_TOKEN }}'
          )
          # Creer un requirements.txt specifique au Space
          space_reqs = 'transformers==4.46.0\ntorch==2.5.0\ngradio==5.4.0\n'
          with open('space_requirements.txt', 'w') as f:
              f.write(space_reqs)
          api.upload_file(
              path_or_fileobj='space_requirements.txt',
              path_in_repo='requirements.txt',
              repo_id='jackbrayan17/mlops-sentiment-analysis-demo',
              repo_type='space',
              token='${{ secrets.HF_TOKEN }}'
          )
          # Upload du modele dans le Space
          api.upload_folder(
              folder_path='model',
              path_in_repo='model',
              repo_id='jackbrayan17/mlops-sentiment-analysis-demo',
              repo_type='space',
              token='${{ secrets.HF_TOKEN }}'
          )
          print('Application deployee sur HF Spaces avec succes!')
          "
